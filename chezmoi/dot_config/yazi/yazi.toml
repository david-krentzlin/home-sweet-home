# ~/.config/yazi/yazi.toml

[manager]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = true
show_symlink = true
linemode = "size"

[opener]
edit = [
  { run = '"$HOME/.local/bin/hx" %s', block = true, for = "unix" },
]

[preview]
max_width = 600
max_height = 900

[plugin]

[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- if [ -x "$HOME/.local/share/mise/shims/glow" ]; then CLICOLOR_FORCE=1 "$HOME/.local/share/mise/shims/glow" -w=$w -s=dark "$1"; elif command -v mise >/dev/null 2>&1; then CLICOLOR_FORCE=1 mise exec "github:charmbracelet/glow@latest" -- glow -w=$w -s=dark "$1"; else echo "glow not found"; fi'
